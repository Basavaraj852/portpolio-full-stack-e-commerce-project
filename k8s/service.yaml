apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: smartreview-dev
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: smartreview-dev
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
