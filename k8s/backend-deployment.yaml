apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: smartreview-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 586337033275.dkr.ecr.ap-south-1.amazonaws.com/smartreview-dev/backend:latest
          ports:
            - containerPort: 5000
